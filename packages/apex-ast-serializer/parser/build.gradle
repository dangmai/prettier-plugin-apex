buildscript {
  repositories {
    mavenCentral()
  }
  dependencies {
    // https://mvnrepository.com/artifact/org.apache.groovy/groovy-json
    classpath("org.apache.groovy:groovy-json:5.0.6")
  }
}
plugins {
  id 'java-library'
  id "java-test-fixtures"
  id 'application'
  id 'jacoco'
  id 'org.graalvm.buildtools.native' version '1.1.2'
}

sourceSets {
  test {
    resources {
      srcDirs "../../prettier-plugin-apex/tests"
    }
  }
  testFixtures {
    compileClasspath += sourceSets.main.compileClasspath
    runtimeClasspath += sourceSets.main.runtimeClasspath
  }
}

application {
  mainClass.set("net.dangmai.serializer.Apex")
  // The reflection-free generated serializer needs no module opens; the old
  // --add-opens existed solely for XStream's Optional ReflectionConverter.
  applicationDefaultJvmArgs = []
}

java {
  group = 'net.dangmai'
  version = new groovy.json.JsonSlurper().parse(file('../../../package.json')).version

  // We can't use Gradle's "release" feature because of this bug with GraalVM native build tools:
  // https://github.com/oracle/graal/issues/7414
  sourceCompatibility = JavaVersion.VERSION_17
  targetCompatibility = JavaVersion.VERSION_17
}

processResources {
  filesMatching('**/parser.properties') {
    filter {
      it.replace('0.0.0-DEV', version)
    }
  }
}

repositories {
  flatDir {
    dirs '../libs'
  }
  mavenCentral()
  maven {
    url = "https://jitpack.io"
  }
  gradlePluginPortal()
}

run {
  standardInput = System.in
}

ext {
  junitVersion = '6.1.0'
}

dependencies {
  api(":apex-jorje-lsp")

  // https://mvnrepository.com/artifact/com.fasterxml.jackson.core/jackson-core
  // Streaming JSON writer backing the generated, reflection-free serializer.
  // Core only (not databind), so there is no runtime reflection.
  api("com.fasterxml.jackson.core:jackson-core:2.18.2")

  // https://mvnrepository.com/artifact/commons-cli/commons-cli
  api("commons-cli:commons-cli:1.11.0")

  // https://mvnrepository.com/artifact/commons-io/commons-io
  api("commons-io:commons-io:2.22.0")

  // https://mvnrepository.com/artifact/com.fasterxml.jackson.core/jackson-databind
  // Test-only: parse both serializers' JSON into trees for structural comparison.
  testImplementation("com.fasterxml.jackson.core:jackson-databind:2.18.2")

  // https://mvnrepository.com/artifact/org.junit.jupiter/junit-jupiter-api
  testImplementation("org.junit.jupiter:junit-jupiter-api:${junitVersion}")
  testRuntimeOnly("org.junit.jupiter:junit-jupiter-engine:${junitVersion}")
  testRuntimeOnly("org.junit.platform:junit-platform-launcher:${junitVersion}")

  // https://mvnrepository.com/artifact/org.json/json
  testFixturesImplementation("org.json:json:20250517")
}

// Common configs for all Test tasks. Currently this includes the standard
// `test` task, and the `nativeInstrumentedTest` task.
tasks.withType(Test) {
  useJUnitPlatform()
  jvmArgs += application.applicationDefaultJvmArgs
  testLogging.showStandardStreams = true
}

test {
  finalizedBy jacocoTestReport
}
jacocoTestReport {
  reports {
    xml.required = true
  }
  dependsOn test
}

// Generate the reflection-free AST serializer from jorje at build time, and
// compile the result into this module alongside the hand-written sources.
evaluationDependsOn(':serializer-generator')
def astSerializerOutputDir = layout.buildDirectory.dir("generated/sources/ast-serializer")
def generateAstSerializer = tasks.register('generateAstSerializer', JavaExec) {
  def generatorProject = project(':serializer-generator')
  dependsOn generatorProject.tasks.named('classes')
  dependsOn generatorProject.tasks.named('processResources')
  classpath = generatorProject.sourceSets.main.runtimeClasspath
  mainClass = 'net.dangmai.serializer.codegen.SerializerGenerator'
  def outDir = astSerializerOutputDir.get().asFile
  args = [outDir.absolutePath]
  inputs.files(generatorProject.sourceSets.main.runtimeClasspath)
  outputs.dir(astSerializerOutputDir)
  doFirst { delete(outDir) }
}
sourceSets.main.java.srcDir(astSerializerOutputDir)
tasks.named('compileJava') {
  dependsOn generateAstSerializer
}

// This task can be used to run tests under native instrumentation
task nativeInstrumentedTest(type: Test) {
  // Since Gradle 9, we need to explicitly specify the test classes and classpath
  // https://docs.gradle.org/current/userguide/upgrading_major_version_9.html#test_tasks_may_no_longer_execute_expected_tests
  testClassesDirs = testing.suites.test.sources.output.classesDirs
  classpath = testing.suites.test.sources.runtimeClasspath
}

graalvmNative {
  metadataRepository {
    // Since version 0.10.0, the metadata repository is enabled by default,
    // The metadata repository contains community-driven collection of
    // reachability metadata for open-source libraries. However, they are
    // leading to issues with apex-jorje-lsp library, and I haven't found
    // a way to exclude it yet, so for now I'll disable it.
    enabled = false
  }
  agent {
    enabled = true
    defaultMode = "standard"

    // Weird syntax: https://github.com/graalvm/native-build-tools/issues/303
    // This is here because we don't want to set up the full native-image
    // system while running tests in CI/CD. generateAstSerializer is also
    // excluded: it's a plain build-time JavaExec (the serializer codegen) that
    // would otherwise be launched with -agentlib:native-image-agent and fail
    // wherever the native-image agent isn't installed (e.g. CI test jobs).
    java.util.function.Predicate predicate = { t ->
      t.name != 'test' && t.name != 'run' && t.name != 'generateAstSerializer'
    }
    tasksToInstrumentPredicate = predicate
  }
  binaries {
    main {
      configurationFileDirectories.from(
        file('build/native/agent-output/nativeInstrumentedTest')
      )
      imageName = 'apex-ast-serializer'
      sharedLibrary = false
      buildArgs.addAll(application.applicationDefaultJvmArgs)
      // Certain Linux distribution doesn't allow dynamic-linked binaries to be
      // run, for example, NixOS, so we need to build a static binary.
      if (System.getProperty('os.name').toLowerCase().contains('linux') && System.getProperty('os.arch').contains('amd64')) {
        environmentVariables.put("PATH", file('../musl-toolchain/bin').absolutePath + ":" + System.getenv("PATH"))
        buildArgs.add('--static');
        buildArgs.add('--libc=musl');
        // #1822 - By default, the native executable can't be run in Docker x64
        // images on macOS with M-chips. We set the compatibility flag to ensure
        // it can be run in that context, although it may not be as optimized.
        buildArgs.add('-march=compatibility');
        // #1733, #1809 - We need to manually increase stack size for musl static binary,
        // otherwise we will run into stack overflow issues.
        // https://github.com/oracle/graal/issues/3398
        buildArgs.add('-H:+UnlockExperimentalVMOptions');
        buildArgs.add('-H:CCompilerOption=-Wl,-z,stack-size=10485760');
      }
    }
  }
}

nativeCompile {
  mustRunAfter nativeInstrumentedTest
}
